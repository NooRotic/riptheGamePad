# riptheGamePad config — first-run minimal template
#
# What this gives you out of the box:
#   - One profile (`ai-only`) accepting WebSocket commands from any AI client,
#     passed straight through to the virtual pad.
#   - WebSocket server on 127.0.0.1:7777
#   - F9 / F10 cycle profiles, Ctrl+F12 panic-disconnect
#
# To add a physical fight stick / pad:
#   1. Run `riptheGamePad --list-devices` to print plugged-in UUIDs.
#   2. Add an entry under `[devices]` mapping a friendly alias to that UUID.
#   3. Add a profile that lists the alias under `inputs` and define
#      `[[profile.rule]]` blocks (or `to = "passthrough"`) for the controls
#      you want.
#
# See docs/superpowers/specs/2026-05-07-riptheGamePad-design.md §6 for the
# four reference scenarios (mixer, pad-passthrough, ai-only, copilot).

[devices]
# Aliases here once you know your device's identifier. For XInput devices
# (Xbox 360 / Xbox One controllers, sticks in X-Input mode) use 'xinput:0',
# 'xinput:1', etc. — the slot number maps to gilrs's GamepadId order.
# For non-XInput devices (rare on Windows), use 'uuid:...' as printed by
# `riptheGamePad --list-devices`.
#
# fight_stick   = "xinput:0"
# fight_stick_2 = "xinput:1"
# xbox_pad      = "xinput:0"

[[profile]]
id = "ai-only"
name = "AI Driver"
inputs = ["ai:*"]

[[profile.rule]]
from = { device = "ai:*", control = "*" }
to = "passthrough"

[default]
profile = "ai-only"

[server]
addr = "127.0.0.1:7777"

[hotkeys]
next_profile     = "F9"
prev_profile     = "F10"
panic_disconnect = "Ctrl+F12"
